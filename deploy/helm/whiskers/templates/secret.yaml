{{- /* Convenience secrets for inline values. Anything beyond a lab should use existingSecret. */ -}}
{{- if and .Values.vault.key (not .Values.vault.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "whiskers.fullname" . }}-vault
  labels:
    {{- include "whiskers.labels" . | nindent 4 }}
type: Opaque
stringData:
  vaultKey: {{ .Values.vault.key | quote }}
{{- end }}
{{- if and (eq .Values.database.provider "postgres") .Values.database.connectionString (not .Values.database.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "whiskers.fullname" . }}-db
  labels:
    {{- include "whiskers.labels" . | nindent 4 }}
type: Opaque
stringData:
  connectionString: {{ .Values.database.connectionString | quote }}
{{- end }}
